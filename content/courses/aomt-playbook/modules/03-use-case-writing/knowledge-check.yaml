title: "Module 3 Knowledge Check"
description: "Test your understanding of use case writing principles and the Metro Cable example."
questions:
  - id: "m3-q1"
    type: "multiple-choice-single"
    question: "What is the primary purpose of a use case document?"
    options:
      - id: "a"
        text: "To specify the database schema and API endpoints for developers"
      - id: "b"
        text: "To describe how a user interacts with software to accomplish a specific goal, bridging business needs and development requirements"
      - id: "c"
        text: "To document the project timeline and sprint plan for the agile team"
      - id: "d"
        text: "To provide the development team with a working prototype of the intended system"
    correct_option: "b"
    explanation: "A use case bridges the gap between the business side — which knows what needs to happen — and the development team, which needs to know exactly how the system should behave at each step."
    lesson_link: "01-use-case-guide"
    lesson_link_label: "Review: What Is a Use Case?"

  - id: "m3-q2"
    type: "true-false"
    question: "A single use case document can cover multiple user goals as long as they involve the same actor."
    correct_answer: false
    explanation: "Each use case should describe exactly one goal. If you find yourself writing 'and then the user can also…' — that's a second use case. Combining goals creates ambiguity and makes it harder for developers to scope and test the work."
    lesson_link: "01-use-case-guide"
    lesson_link_label: "Review: Tips & Cautions"

  - id: "m3-q3"
    type: "multiple-choice-single"
    question: "Why are Alternative and Exception Flows often considered more valuable to developers than the Main Success Flow?"
    options:
      - id: "a"
        text: "They describe the most common path users take through the system"
      - id: "b"
        text: "They define the performance and security requirements"
      - id: "c"
        text: "They capture the edge cases, errors, and unexpected conditions the system must handle — which are the most common source of bugs"
      - id: "d"
        text: "They replace the need to write separate test cases"
    correct_option: "c"
    explanation: "The happy path is usually straightforward to build. It's the edge cases — what happens when a system is unavailable, a constraint is violated, or a user does something unexpected — that require the most careful design and are the most common source of bugs."
    lesson_link: "01-use-case-guide"
    lesson_link_label: "Review: Tips & Cautions"

  - id: "m3-q4"
    type: "multiple-choice-single"
    question: "A business analyst writes: 'The system should store route data in a PostgreSQL database and render the map using a React component.' What is wrong with this statement in a use case?"
    options:
      - id: "a"
        text: "It is too brief — a use case requires more detail about the data model"
      - id: "b"
        text: "It specifies implementation technology, which is the development team's decision, not the business writer's"
      - id: "c"
        text: "It does not include an actor name or a trigger event"
      - id: "d"
        text: "It fails to mention non-functional requirements such as performance"
    correct_option: "b"
    explanation: "A use case describes what the system must do, not how it does it. Specifying the database or UI framework oversteps the business writer's role — those are architectural decisions for the development team."
    lesson_link: "01-use-case-guide"
    lesson_link_label: "Review: Tips & Cautions"

  - id: "m3-q5"
    type: "multiple-choice-single"
    question: "In UC-01, Business Rule BR-3 states that technicians must only be assigned jobs requiring certifications they currently hold. What type of use case component does this represent, and why does it belong there rather than in the Main Success Flow?"
    options:
      - id: "a"
        text: "A precondition — it must be verified before the use case begins"
      - id: "b"
        text: "A postcondition — it confirms the state of the system after dispatch"
      - id: "c"
        text: "A business rule — it is a standing constraint the system must always enforce, separate from the step-by-step interaction"
      - id: "d"
        text: "A non-functional requirement — it defines a performance or security expectation"
    correct_option: "c"
    explanation: "Business rules are policies or constraints that govern system behavior across many scenarios. Listing them separately keeps the flow readable and ensures developers apply the rules consistently throughout the system."
    lesson_link: "01-use-case-guide"
    lesson_link_label: "Review: Metro Cable Example"

  - id: "m3-q6"
    type: "fill-in-blank"
    question: "UC-01 lists several Open Issues, including whether the system should use real-time traffic data or historical averages. Complete the principle this illustrates."
    word_bank:
      - "assumptions"
      - "silent"
      - "bugs"
      - "features"
    segments:
      - type: "text"
        value: "Unwritten rules and unresolved "
      - type: "blank"
        value: "assumptions"
        accept:
          - "assumptions"
          - "assumption"
      - type: "text"
        value: " become "
      - type: "blank"
        value: "silent"
        accept:
          - "silent"
      - type: "text"
        value: " misunderstandings — and eventually expensive "
      - type: "blank"
        value: "bugs"
        accept:
          - "bugs"
          - "bug"
      - type: "text"
        value: "."
    explanation: "The Open Issues section is just as important as the flows. Surfacing what is unknown or assumed prevents the development team from filling gaps with their own guesses — which may not match business intent."
    lesson_link: "01-use-case-guide"
    lesson_link_label: "Review: Open Issues & Assumptions"
